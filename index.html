<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo Dõi Hoàn Thành Chi Tiêu</title>
    <style>
        /* CSS Reset & Cơ bản */
        body {
            font-family: "Times New Roman", Times, serif;
            font-size: 16px;
            margin: 0;
            background-color: #f0f4f8;
            color: #333;
        }

        /* --- Màn hình Đăng nhập --- */
        #login-screen {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2c3e50, #3498db);
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 300px;
        }
        .login-box h2 { margin-top: 0; color: #2c3e50; }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .login-box button {
            width: 100%;
            padding: 12px;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .login-box button:hover { background: #219653; }

        /* --- Màn hình Chính --- */
        #main-app { display: none; }
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .container {
            max-width: 900px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* --- Controls (Nút gạt & Chọn ngày) --- */
        .controls-area {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #e9ecef;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .toggle-group {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
        }
        
        /* Toggle Switch CSS */
        .switch { position: relative; display: inline-block; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #3498db; }
        input:checked + .slider:before { transform: translateX(24px); }

        select#day-selector {
            padding: 8px;
            font-family: inherit;
            font-size: 16px;
            border-radius: 4px;
            border: 1px solid #ccc;
            display: none; /* Ẩn mặc định */
        }

        /* --- Tables --- */
        .day-section {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px dashed #bdc3c7;
        }
        .day-header {
            font-size: 20px;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th { background-color: #f8f9fa; text-align: center; }
        .cat-row {
            background-color: #f1c40f !important;
            font-weight: bold;
        }
        .col-check { width: 5%; text-align: center; }
        .col-nd { width: 40%; }
        .col-gia { width: 20%; text-align: right; }
        .col-sl { width: 10%; text-align: center; }
        .col-tong { width: 25%; text-align: right; font-weight: bold; color: #c0392b;}

        /* Custom Checkbox */
        input[type="checkbox"].done-check {
            width: 20px; height: 20px; cursor: pointer;
            accent-color: #27ae60;
        }
        .item-done td { text-decoration: line-through; color: #7f8c8d; background: #fdfdfd;}

        #status-msg {
            font-size: 14px;
            color: #f39c12;
            margin-left: 15px;
        }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2>HỆ THỐNG KIỂM TRA</h2>
            <p style="color:#7f8c8d; font-size:14px;">Nhập SĐT để đồng bộ dữ liệu</p>
            <input type="tel" id="login-phone" placeholder="Số điện thoại..." value="0839578432">
            <button onclick="handleLogin()">TRUY CẬP</button>
            <p id="login-error" style="color:#e74c3c; font-size:14px; display:none; margin-top:10px;">Không tìm thấy dữ liệu!</p>
        </div>
    </div>

    <div id="main-app">
        <div class="navbar">
            <div style="font-size: 20px; font-weight: bold;">KIỂM TRA TIẾN ĐỘ CHI TIÊU <span id="status-msg"></span></div>
            <div>
                <span id="user-info" style="margin-right: 15px; font-weight: bold;"></span>
                <button onclick="logout()" style="padding: 5px 10px; cursor:pointer;">Đăng xuất</button>
            </div>
        </div>

        <div class="container">
            <div class="controls-area">
                <div class="toggle-group">
                    <span>Xem toàn bộ</span>
                    <label class="switch">
                        <input type="checkbox" id="view-toggle" onchange="toggleViewMode()">
                        <span class="slider"></span>
                    </label>
                    <span>Xem từng ngày</span>
                </div>
                
                <select id="day-selector" onchange="renderData()">
                    <option value="thu-2">Thứ 2</option>
                    <option value="thu-3">Thứ 3</option>
                    <option value="thu-4">Thứ 4</option>
                    <option value="thu-5">Thứ 5</option>
                    <option value="thu-6">Thứ 6</option>
                    <option value="thu-7">Thứ 7</option>
                    <option value="chua-nhat">Chúa nhật</option>
                </select>
            </div>

            <h3 style="text-align: center; border-bottom: 2px solid #000; padding-bottom: 10px;">
                DỮ LIỆU TUẦN: <span id="display-week" style="color:#e74c3c;">...</span>
            </h3>

            <div id="data-container"></div>
        </div>
    </div>

    <script>
        // CẤU HÌNH API
        const READ_API_BASE = "https://kehoachthuchi-b923b-default-rtdb.asia-southeast1.firebasedatabase.app/usersData/";
        const WRITE_API_BASE = "https://dulieuchitieu-2ca4d-default-rtdb.firebaseio.com/trackingData/";

        // Biến toàn cục
        let currentUserPhone = "";
        let currentWeekKey = "";
        let weekData = null; // Chứa dữ liệu chi tiêu tuần
        let trackingData = {}; // Chứa trạng thái checkbox

        const daysArr = ['thu-2', 'thu-3', 'thu-4', 'thu-5', 'thu-6', 'thu-7', 'chua-nhat'];
        const daysName = ['Thứ 2', 'Thứ 3', 'Thứ 4', 'Thứ 5', 'Thứ 6', 'Thứ 7', 'Chúa nhật'];
        const catsArr = ['ansang', 'antrua', 'antoi', 'dichuyen', 'tietkiem', 'khac'];
        const catsName = ['Ăn sáng', 'Ăn trưa', 'Ăn tối', 'Di chuyển', 'Tiết kiệm', 'Khác'];

        // --- 1. XỬ LÝ ĐĂNG NHẬP ---
        async function handleLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            if (!phone) return alert("Vui lòng nhập SĐT");
            
            document.getElementById('login-error').style.display = 'none';
            document.getElementById('login-screen').style.opacity = '0.5';

            try {
                // Đọc dữ liệu từ DB Gốc
                let res = await fetch(`${READ_API_BASE}${phone}.json`);
                let data = await res.json();

                if (!data || !data.allWeeksData) {
                    document.getElementById('login-error').style.display = 'block';
                    document.getElementById('login-screen').style.opacity = '1';
                    return;
                }

                // Tìm tuần mới nhất
                let weeks = Object.keys(data.allWeeksData).sort();
                currentWeekKey = weeks[weeks.length - 1]; // Lấy tuần cuối cùng
                weekData = data.allWeeksData[currentWeekKey].expenses;
                currentUserPhone = phone;

                // Load trạng thái checkbox từ DB Mới
                await loadTrackingData();

                // Đổi UI
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('user-info').innerText = `Tài khoản: ${phone}`;
                document.getElementById('display-week').innerText = currentWeekKey;

                renderData();

            } catch (err) {
                console.error(err);
                alert("Lỗi kết nối đến Server!");
                document.getElementById('login-screen').style.opacity = '1';
            }
        }

        function logout() {
            currentUserPhone = "";
            weekData = null;
            document.getElementById('login-screen').style.display = 'flex';
            document.getElementById('main-app').style.display = 'none';
            document.getElementById('login-screen').style.opacity = '1';
        }

        // --- 2. XỬ LÝ ĐỌC/GHI TRẠNG THÁI (DB MỚI) ---
        async function loadTrackingData() {
            setStatus("Đang đồng bộ...");
            try {
                let res = await fetch(`${WRITE_API_BASE}${currentUserPhone}/${currentWeekKey}.json`);
                let data = await res.json();
                trackingData = data || {};
                setStatus("");
            } catch (err) {
                console.error(err);
                setStatus("Lỗi đồng bộ", "red");
            }
        }

        // Debounce timer để tránh gọi API liên tục khi click nhiều checkbox
        let saveTimer; 
        function updateTaskStatus(day, cat, index, isChecked, rowElement) {
            // Đổi CSS dòng
            if (isChecked) rowElement.classList.add('item-done');
            else rowElement.classList.remove('item-done');

            // Lưu vào object local
            if (!trackingData[day]) trackingData[day] = {};
            if (!trackingData[day][cat]) trackingData[day][cat] = {};
            trackingData[day][cat][index] = isChecked;

            setStatus("Đang lưu...", "orange");

            // Cập nhật lên DB mới (Chỉ update PATCH điểm thay đổi nhỏ)
            clearTimeout(saveTimer);
            saveTimer = setTimeout(async () => {
                try {
                    let path = `${day}/${cat}/${index}`;
                    await fetch(`${WRITE_API_BASE}${currentUserPhone}/${currentWeekKey}.json`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ [path]: isChecked })
                    });
                    setStatus("Đã lưu", "#2ecc71");
                    setTimeout(() => setStatus(""), 2000);
                } catch (e) {
                    setStatus("Lỗi lưu DB", "red");
                }
            }, 1000);
        }

        function setStatus(text, color = "white") {
            let el = document.getElementById('status-msg');
            el.innerText = text ? `(${text})` : "";
            el.style.color = color;
        }

        // --- 3. XỬ LÝ GIAO DIỆN HIỂN THỊ ---
        function toggleViewMode() {
            const isSingleDay = document.getElementById('view-toggle').checked;
            const selector = document.getElementById('day-selector');
            if (isSingleDay) {
                selector.style.display = 'inline-block';
            } else {
                selector.style.display = 'none';
            }
            renderData();
        }

        function formatVND(num) {
            return Number(num).toLocaleString('vi-VN') + ' đ';
        }

        function renderData() {
            const container = document.getElementById('data-container');
            container.innerHTML = "";

            const isSingleDay = document.getElementById('view-toggle').checked;
            const selectedDay = document.getElementById('day-selector').value;

            let daysToRender = isSingleDay ? [selectedDay] : daysArr;

            daysToRender.forEach(dayKey => {
                let dayIndex = daysArr.indexOf(dayKey);
                let dayName = daysName[dayIndex];
                
                let html = `<div class="day-section">
                                <div class="day-header">${dayName}</div>
                                <table>
                                    <thead>
                                        <tr>
                                            <th class="col-check">Xong</th>
                                            <th class="col-nd">Nội dung / Đối tượng</th>
                                            <th class="col-gia">Giá</th>
                                            <th class="col-sl">SL</th>
                                            <th class="col-tong">Thành tiền</th>
                                        </tr>
                                    </thead>`;

                // Render từng Danh mục
                catsArr.forEach((catKey, cIdx) => {
                    let items = (weekData[dayKey] && weekData[dayKey][catKey]) ? weekData[dayKey][catKey] : [];
                    if (items.length > 0) {
                        // Dòng tiêu đề Category
                        html += `<tbody>
                                    <tr><td colspan="5" class="cat-row">- ${catsName[cIdx]}</td></tr>`;
                        
                        // Các item bên trong
                        items.forEach((item, index) => {
                            // Lọc chữ Nộp quỹ như app gốc
                            let cleanNd = item.nd ? item.nd.replace(/^Nộp quỹ:\s*/i, '') : '';
                            let title = `${cleanNd} ${item.dt ? ' | ' + item.dt : ''}`;
                            
                            // Kiểm tra trạng thái đã tick chưa
                            let isDone = trackingData[dayKey] && trackingData[dayKey][catKey] && trackingData[dayKey][catKey][index];
                            let rowClass = isDone ? 'item-done' : '';
                            let checkedAttr = isDone ? 'checked' : '';

                            html += `<tr class="${rowClass}" id="row-${dayKey}-${catKey}-${index}">
                                        <td class="col-check">
                                            <input type="checkbox" class="done-check" ${checkedAttr} 
                                            onchange="updateTaskStatus('${dayKey}', '${catKey}', ${index}, this.checked, this.closest('tr'))">
                                        </td>
                                        <td>${title}</td>
                                        <td class="col-gia">${formatVND(item.gia.replace(/,/g, ''))}</td>
                                        <td class="col-sl">${item.sl}</td>
                                        <td class="col-tong">${formatVND(item.total)}</td>
                                    </tr>`;
                        });
                        html += `</tbody>`;
                    }
                });

                html += `</table></div>`;
                container.innerHTML += html;
            });
            
            // Nếu không có dữ liệu nào
            if(container.innerHTML === "") {
                container.innerHTML = `<p style="text-align:center; color:#7f8c8d; font-style:italic;">Không có nội dung chi tiêu nào được lên kế hoạch.</p>`;
            }
        }
    </script>
</body>
</html>
